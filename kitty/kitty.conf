# ── font ──────────────────────────────────────────
font_family      Maple Mono
bold_font        Maple Mono Bold
italic_font      Maple Mono Italic
bold_italic_font Maple Mono Bold Italic
font_size        13.0

# ── cursor ────────────────────────────────────────
cursor                #9400D3
cursor_text_color     #e0d0ff
cursor_shape          block
cursor_blink_interval 0

# ── text ──────────────────────────────────────────
foreground            #e0d0ff
background            #141216
background_opacity    0.95

# ── selection ─────────────────────────────────────
selection_foreground  #141216
selection_background  #9400D3

# ── url ───────────────────────────────────────────
url_color             #a020f0
url_style             curly

# ── window ────────────────────────────────────────
window_padding_width  8
hide_window_decorations yes
remember_window_size  yes
confirm_os_window_close 0

# ── tabs ──────────────────────────────────────────
tab_bar_style                    powerline
tab_powerline_style              angled
active_tab_foreground            #141216
active_tab_background            #9400D3
inactive_tab_foreground          #e0d0ff
inactive_tab_background          #27232b

# ── colors ────────────────────────────────────────
# black
color0   #141216
color8   #27232b

# red
color1   #ff7294
color9   #ff9fb6

# green
color2   #7fff96
color10  #a5ffb5

# yellow
color3   #ffd872
color11  #ffe6a5

# blue → purple
color4   #9400D3
color12  #a020f0

# magenta
color5   #6a0099
color13  #b040ff

# cyan → purple tint
color6   #8f56e1
color14  #ac82e9

# white
color7   #e0d0ff
color15  #f0e8ff

# ── misc ──────────────────────────────────────────
enable_audio_bell    no
copy_on_select       yes
strip_trailing_spaces smart
scrollback_lines     10000

